workflows:
  ios-workflow:
    name: iOS Build → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      groups:
        - app_store_connect
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.fortunetalk.app"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "7PY5UXRT74"
        APP_STORE_CONNECT_ISSUER_ID: "9c77cc55-b832-447a-9f47-45742df69211"
      node: 18
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Build web assets
        script: |
          npm run build

      - name: Fix CocoaPods xcodeproj compatibility
        script: |
          sudo gem update xcodeproj

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files
        script: |
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/dist_key.pem
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/dist_key.pem \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
